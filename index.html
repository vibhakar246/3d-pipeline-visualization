<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing App - 3D CI/CD Pipeline</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 100;
            pointer-events: none;
            backdrop-filter: blur(5px);
            border-left: 4px solid #00ff00;
        }
        #title { font-size: 24px; margin-bottom: 5px; color: #00ff00; }
        #subtitle { font-size: 14px; color: #ccc; }
        #author {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
            font-family: monospace;
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }
        .status-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            color: #00ff00;
            font-weight: bold;
            z-index: 100;
            pointer-events: none;
            font-family: monospace;
            border: 1px solid #00ff00;
        }
    </style>
</head>
<body>
    <div id="info">
        <div id="title">🚀 Billing Application</div>
        <div id="subtitle">8-Stage CI/CD Pipeline | Docker | Jenkins | AWS | Trivy</div>
    </div>
    <div class="status-badge">
        🟢 PIPELINE: SUCCESSFUL ✅
    </div>
    <div id="controls-hint">
        🖱️ Drag to rotate | Right-click to pan | Scroll to zoom
    </div>
    <div id="author">
        👨‍💻 Vibhakar Kumar Singh | DevOps Engineer
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // Setup scenes
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.003);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 6, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // CSS2 Renderer for text labels
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.5;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x1a1a2e);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(5, 10, 7);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x4a4aff, 0.3);
        fillLight.position.set(-2, 1, 3);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xff4a4a, 0.2);
        backLight.position.set(0, 2, -5);
        scene.add(backLight);
        
        const colorLights = [
            { color: 0x00ffff, pos: [-4, 1, 2] },
            { color: 0xff00ff, pos: [4, 1, 2] }
        ];
        colorLights.forEach(l => {
            const light = new THREE.PointLight(l.color, 0.4);
            light.position.set(l.pos[0], l.pos[1], l.pos[2]);
            scene.add(light);
        });

        // Ground grid with glow
        const gridHelper = new THREE.GridHelper(25, 30, 0x00adb5, 0x1a1a4a);
        gridHelper.position.y = -1.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.5;
        scene.add(gridHelper);
        
        // Floating particles background
        const particleCount = 800;
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesPositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlesPositions[i*3] = (Math.random() - 0.5) * 100;
            particlesPositions[i*3+1] = (Math.random() - 0.5) * 30;
            particlesPositions[i*3+2] = (Math.random() - 0.5) * 50 - 20;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlesPositions, 3));
        const particlesMaterial = new THREE.PointsMaterial({ color: 0x00adb5, size: 0.05, transparent: true, opacity: 0.4 });
        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);

        // Pipeline stages data
        const stages = [
            { name: "📦 GITHUB", desc: "Code Repository | Git Push", color: 0x6e5494, pos: [-6, 0, 0], emoji: "💾", stage: "SCM" },
            { name: "⚙️ JENKINS", desc: "CI/CD Orchestration | Webhook", color: 0x00adb5, pos: [-3.5, 0, 0], emoji: "🔧", stage: "Build" },
            { name: "🐳 DOCKER", desc: "Containerization | docker build", color: 0x4aff6a, pos: [-1, 0, 0], emoji: "📦", stage: "Image" },
            { name: "🔒 TRIVY", desc: "Security Scan | Vulnerability", color: 0xff4aff, pos: [1.5, 0, 0], emoji: "🛡️", stage: "Security" },
            { name: "☁️ AWS ECR", desc: "Container Registry | docker push", color: 0xffaa4a, pos: [4, 0, 0], emoji: "🗄️", stage: "Registry" },
            { name: "🚀 AWS EC2", desc: "Deployment | docker-compose up", color: 0xff6a4a, pos: [6.5, 0, 0], emoji: "🖥️", stage: "Production" }
        ];

        const cubes = [];
        const particlesSystems = [];

        // Create 3D cubes with glow
        stages.forEach((stage, index) => {
            // Main cube
            const geometry = new THREE.BoxGeometry(1.4, 1.4, 1.4);
            const material = new THREE.MeshStandardMaterial({ 
                color: stage.color, 
                metalness: 0.8, 
                roughness: 0.2,
                emissive: stage.color,
                emissiveIntensity: 0.15
            });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(stage.pos[0], stage.pos[1], stage.pos[2]);
            cube.castShadow = true;
            cube.receiveShadow = true;
            scene.add(cube);
            cubes.push(cube);
            
            // Glow effect (slightly larger transparent cube)
            const glowGeo = new THREE.BoxGeometry(1.6, 1.6, 1.6);
            const glowMat = new THREE.MeshBasicMaterial({ color: stage.color, transparent: true, opacity: 0.15 });
            const glowCube = new THREE.Mesh(glowGeo, glowMat);
            glowCube.position.set(stage.pos[0], stage.pos[1], stage.pos[2]);
            scene.add(glowCube);
            
            // CSS2D Label
            const div = document.createElement('div');
            div.textContent = `${stage.emoji} ${stage.name}\n${stage.desc}`;
            div.style.color = 'white';
            div.style.fontSize = '13px';
            div.style.fontWeight = 'bold';
            div.style.textAlign = 'center';
            div.style.background = `rgba(0,0,0,0.7)`;
            div.style.padding = '8px 12px';
            div.style.borderRadius = '8px';
            div.style.borderLeft = `3px solid ${new THREE.Color(stage.color).getStyle()}`;
            div.style.fontFamily = 'monospace';
            div.style.backdropFilter = 'blur(5px)';
            const label = new CSS2DObject(div);
            label.position.set(stage.pos[0], stage.pos[1] - 1.2, stage.pos[2]);
            scene.add(label);
            
            // Orbiting particles around each cube
            const particleGroup = [];
            const particleGeo = new THREE.SphereGeometry(0.06, 8, 8);
            for (let i = 0; i < 30; i++) {
                const particleMat = new THREE.MeshStandardMaterial({ color: stage.color, emissive: stage.color, emissiveIntensity: 0.5 });
                const particle = new THREE.Mesh(particleGeo, particleMat);
                particle.userData = {
                    angle: (i / 30) * Math.PI * 2,
                    radius: 1.0,
                    speed: 0.01 + Math.random() * 0.01,
                    yOffset: (Math.random() - 0.5) * 1.2
                };
                particle.position.set(
                    stage.pos[0] + Math.cos(particle.userData.angle) * particle.userData.radius,
                    stage.pos[1] + particle.userData.yOffset,
                    stage.pos[2] + Math.sin(particle.userData.angle) * particle.userData.radius
                );
                scene.add(particle);
                particleGroup.push(particle);
            }
            particlesSystems.push(particleGroup);
            
            // Floating stage number
            const stageDiv = document.createElement('div');
            stageDiv.textContent = `${index + 1}`;
            stageDiv.style.color = '#fff';
            stageDiv.style.fontSize = '20px';
            stageDiv.style.fontWeight = 'bold';
            stageDiv.style.background = new THREE.Color(stage.color).getStyle();
            stageDiv.style.width = '30px';
            stageDiv.style.height = '30px';
            stageDiv.style.borderRadius = '50%';
            stageDiv.style.display = 'flex';
            stageDiv.style.alignItems = 'center';
            stageDiv.style.justifyContent = 'center';
            stageDiv.style.border = '2px solid white';
            const stageLabel = new CSS2DObject(stageDiv);
            stageLabel.position.set(stage.pos[0], stage.pos[1] + 1.0, stage.pos[2]);
            scene.add(stageLabel);
        });

        // Create flowing particles (code flow)
        const flowParticles = [];
        const flowPath = [
            [-6, 0, 0], [-4.75, 0, 0],
            [-3.5, 0, 0], [-2.25, 0, 0],
            [-1, 0, 0], [0.25, 0, 0],
            [1.5, 0, 0], [2.75, 0, 0],
            [4, 0, 0], [5.25, 0, 0],
            [6.5, 0, 0]
        ];
        
        // Create connection lines with glow
        for (let i = 0; i < flowPath.length - 1; i++) {
            const points = [];
            points.push(new THREE.Vector3(flowPath[i][0], flowPath[i][1], flowPath[i][2]));
            points.push(new THREE.Vector3(flowPath[i+1][0], flowPath[i+1][1], flowPath[i+1][2]));
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ color: 0x00ff00 });
            const line = new THREE.Line(geometry, material);
            scene.add(line);
        }
        
        // Create flowing particles
        for (let i = 0; i < 20; i++) {
            const particleGeo = new THREE.SphereGeometry(0.08, 16, 16);
            const particleMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 0.8 });
            const particle = new THREE.Mesh(particleGeo, particleMat);
            particle.userData = { progress: Math.random(), speed: 0.005 + Math.random() * 0.003 };
            scene.add(particle);
            flowParticles.push(particle);
        }
        
        // Rotating stars effect
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1500;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // Animation variables
        let time = 0;
        
        // Animate function
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // Rotate stars slowly
            stars.rotation.y += 0.0005;
            stars.rotation.x += 0.0003;
            particles.rotation.y += 0.0002;
            
            // Animate orbiting particles
            particlesSystems.forEach((particleGroup, idx) => {
                const stage = stages[idx];
                particleGroup.forEach(particle => {
                    particle.userData.angle += particle.userData.speed;
                    particle.position.x = stage.pos[0] + Math.cos(particle.userData.angle) * particle.userData.radius;
                    particle.position.z = stage.pos[2] + Math.sin(particle.userData.angle) * particle.userData.radius;
                });
            });
            
            // Animate flowing particles along path
            flowParticles.forEach(particle => {
                particle.userData.progress += particle.userData.speed;
                if (particle.userData.progress >= 1) {
                    particle.userData.progress = 0;
                }
                
                const pathIndex = Math.floor(particle.userData.progress * (flowPath.length - 1));
                const nextIndex = Math.min(pathIndex + 1, flowPath.length - 1);
                const subProgress = (particle.userData.progress * (flowPath.length - 1)) - pathIndex;
                
                const x = flowPath[pathIndex][0] + (flowPath[nextIndex][0] - flowPath[pathIndex][0]) * subProgress;
                const y = flowPath[pathIndex][1] + (flowPath[nextIndex][1] - flowPath[pathIndex][1]) * subProgress;
                const z = flowPath[pathIndex][2] + (flowPath[nextIndex][2] - flowPath[pathIndex][2]) * subProgress;
                
                particle.position.set(x, y + Math.sin(time * 10) * 0.1, z);
                
                const intensity = 0.5 + Math.sin(time * 20) * 0.3;
                particle.material.emissiveIntensity = intensity;
            });
            
            // Rotate cubes slightly
            cubes.forEach((cube, idx) => {
                cube.rotation.y += 0.005;
                cube.rotation.x += 0.003;
            });
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log('%c🚀 Billing App 3D Pipeline Viewer Loaded!', 'color: #00ff00; font-size: 16px;');
    </script>
</body>
</html>
